services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        uid: 1000
    container_name: bet_app_prod
    restart: always
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    env_file:
      - ./src/.env
    volumes:
      - bet_app_public_prod:/var/www/html/public
    networks:
      - bet_network
    depends_on:
      mysql:
        condition: service_healthy
      gateways-mock:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: bet_nginx_prod
    restart: always
    ports:
      - "8088:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - bet_app_public_prod:/var/www/html/public:ro
    networks:
      - bet_network
    depends_on:
      - app

  gateways-mock:
    image: matheusprotzen/gateways-mock
    container_name: bet_gateways_mock_prod
    restart: always
    networks:
      - bet_network

  mysql:
    image: mysql:8.4
    container_name: bet_mysql_prod
    restart: always
    env_file:
      - ./src/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - bet_mysql_prod_data:/var/lib/mysql
    networks:
      - bet_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  bet_network:
    driver: bridge

volumes:
  bet_mysql_prod_data:
    driver: local
  bet_app_public_prod:
    driver: local
